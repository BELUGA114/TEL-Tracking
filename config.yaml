# Space-Track TLE 监控配置
# 密钥（账号密码）请在 .env 文件中填写，不要写在这里

# User-Agent 配置（可选）
# Space-Track 和 CelesTrak 不强制要求 User-Agent，但建议填写以标识应用身份
# 格式建议："项目名称/版本 (联系方式)"
# 例如："MySatTracker/1.0 (user@example.com)"
# 留空则不发送 User-Agent 头部
user_agent: ""

targets:
  # 监控目标的 NORAD 编号，多个用逗号分隔
  norad_ids: [25544]

schedule:
  # 每小时请求的分钟数，比如 12 或 48（避开整点/半点高峰）
  # 修改为整点/半点可能增加账号违规风险
  minute: 17

files:
  data_file: tle_data.jsonl    # 轨道数据文件（带轮转保护）
  cache: tle_cache.json      # 运行缓存，自动覆盖
  run_log: tle_log.jsonl     # 运行日志（带轮转保护）
  max_log_size_mb: 10        # 日志轮转阈值（MB）

alerts:
  reentry_warning_km: 200    # 近地点低于此值时发出再入预警
  only_print_on_update: true # true=仅在 TLE 变化时打印，false=每次都打印
  fallback_maneuver_threshold_km: 5.0  # 降级策略阈值（km），xpropagator 不可用时使用

retry:
  login_max_failures: 5      # 登录连续失败上限
  login_pause_seconds: 1800  # 失败后等待时间（秒）
  request_max_retries: 3     # 单次请求最大重试次数
  request_retry_base: 5      # 退避基数（秒），实际等待：5, 10, 20 ...

xpropagator:
  enabled: true              # 是否启用 xpropagator 残差分析
  host: localhost            # xpropagator gRPC 服务地址
  port: 50051                # xpropagator gRPC 服务端口
  maneuver_threshold_km: 5.0 # 机动判定阈值（km），残差超过此值视为真实机动

# 双源数据接入配置
data_source:
  primary: "celestrak"         # 主数据源: "celestrak" | "spacetrack"
  fallback: "spacetrack"       # 备源: "spacetrack" | "celestrak" | "none"
  fallback_threshold: 3        # 主源连续失败几次后切换备源
  celestrak_interval_seconds: 7200   # CelesTrak 最小轮询间隔（秒），勿低于 7200
  use_supplemental: false      # 是否同时查询 SupGP 接口（Starlink 等补充星历）