# Space-Track TLE 监控配置
# 密钥（账号密码）请在 .env 文件中填写，不要写在这里

targets:
  # 监控目标的 NORAD 编号，多个用逗号分隔
  norad_ids: [25544]

schedule:
  # 每小时请求的分钟数，比如 12 或 48（避开整点/半点高峰）
  # 修改为其他值可能增加账号违规风险
  minute: 12

files:
  data_log: tle_data.jsonl   # 轨道数据日志（带轮转保护）
  cache: tle_cache.json      # 运行缓存，自动覆盖
  run_log: tle_log.jsonl     # 运行日志（带轮转保护）
  max_log_size_mb: 10        # 日志轮转阈值（MB）

alerts:
  reentry_warning_km: 200    # 近地点低于此值时发出再入预警
  only_print_on_update: true # true=仅在 TLE 变化时打印，false=每次都打印

retry:
  login_max_failures: 5      # 登录连续失败上限
  login_pause_seconds: 1800  # 失败后等待时间（秒）
  request_max_retries: 3     # 单次请求最大重试次数
  request_retry_base: 5      # 退避基数（秒），实际等待：5, 10, 20 ...